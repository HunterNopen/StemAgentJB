research:
  category: state machine
  rationale: The BinaryTree class manages the state of a binary search tree, allowing
    for dynamic insertion, removal, and retrieval of values while maintaining the
    properties of a binary search tree.
  test_patterns:
  - name: boundary value analysis
    why_relevant: To ensure that edge cases such as adding/removing from an empty
      tree and retrieving min/max values are handled correctly.
  - name: equivalence partitioning
    why_relevant: To validate that the tree behaves correctly for different categories
      of input values, such as duplicates, values less than, equal to, and greater
      than existing nodes.
  - name: state transition testing
    why_relevant: To verify that the state of the tree transitions correctly with
      each add and remove operation, ensuring the tree structure remains valid.
  - name: exception testing
    why_relevant: To confirm that appropriate exceptions are raised for operations
      like getMin and getMax on an empty tree.
  concerns:
  - Potential issues with maintaining the correct structure of the tree during removal,
    especially with nodes that have children.
  - Behavior of closest method when multiple values are equidistant from the target.
  - Performance implications of operations on a non-balanced tree, especially with
    a large number of duplicate values.
