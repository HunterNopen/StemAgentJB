      and maximum valid years, and the limits of days in each month.
  - name: equivalence partitioning
    why_relevant: This pattern helps in identifying valid and invalid input categories,
      ensuring that all types of invalid formats and valid dates are tested.
  - name: error guessing
    why_relevant: This pattern is useful for anticipating common mistakes in date
      formats and ensuring that the function handles them gracefully.
  concerns:
  - The function does not raise exceptions for invalid inputs, which may lead to silent
    failures if not properly tested.
  - Naive testing might miss edge cases related to leap years and month boundaries.
